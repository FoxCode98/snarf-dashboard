
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Not Authorized | SNARF Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 50%, #9333ea 100%);
      padding: 20px;
      -webkit-font-smoothing: antialiased;
    }

    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      opacity: 0.08;
      background: white;
      z-index: 0;
    }
    body::before { width: 400px; height: 400px; top: -100px; left: -100px; }
    body::after  { width: 300px; height: 300px; bottom: -80px; right: -80px; }

    .unauth-card {
      position: relative;
      z-index: 1;
      background: white;
      border-radius: 20px;
      padding: 50px 40px;
      max-width: 480px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2), 0 4px 12px rgba(0,0,0,0.1);
      animation: fadeInUp 0.5s ease-out;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .lock-icon {
      width: 90px;
      height: 90px;
      background: linear-gradient(135deg, #fee2e2, #fecaca);
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 22px;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.3); }
      50%      { transform: scale(1.05); box-shadow: 0 0 0 20px rgba(239, 68, 68, 0); }
    }

    .lock-icon svg { width: 44px; height: 44px; stroke: #dc2626; }

    .unauth-card h1 {
      color: #1e293b;
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 10px;
      letter-spacing: -0.02em;
    }

    .error-code {
      display: inline-block;
      background: #fef2f2;
      color: #dc2626;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.05em;
      margin-bottom: 16px;
    }

    .unauth-card p {
      color: #64748b;
      font-size: 15px;
      line-height: 1.6;
      margin-bottom: 28px;
    }

    .countdown {
      color: #4f46e5;
      font-weight: 600;
      font-size: 13px;
      margin-bottom: 24px;
    }

    .countdown #countdownNum {
      display: inline-block;
      background: #eef2ff;
      padding: 2px 10px;
      border-radius: 10px;
      min-width: 28px;
    }

    .action-buttons {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      padding: 12px 24px;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: all 0.3s ease;
      letter-spacing: 0.01em;
    }

    .btn-primary {
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(79, 70, 229, 0.4);
    }

    .btn-secondary {
      background: #f1f5f9;
      color: #475569;
    }

    .btn-secondary:hover {
      background: #e2e8f0;
    }

    .footer-note {
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid #e2e8f0;
      font-size: 12px;
      color: #94a3b8;
    }

    @media (max-width: 480px) {
      .unauth-card { padding: 36px 24px; }
      .unauth-card h1 { font-size: 22px; }
      .action-buttons { flex-direction: column; }
      .btn { width: 100%; justify-content: center; }
    }
  </style>
</head>
<body>

  <div class="unauth-card">
    <div class="lock-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
    </div>

    <div class="error-code">ERROR 401</div>
    <h1>Not Authorized</h1>
    <p>You don't have permission to access this page. Please sign in with your account to continue.</p>

    <div class="countdown">
      Redirecting to sign in in <span id="countdownNum">10</span>s...
    </div>

    <div class="action-buttons">
      <a href="index.html" class="btn btn-primary">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
          <polyline points="10 17 15 12 10 7"/>
          <line x1="15" y1="12" x2="3" y2="12"/>
        </svg>
        Sign In
      </a>
      <a href="landingpage.html" class="btn btn-secondary">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
        Home
      </a>
    </div>

    <div class="footer-note">
      🔒 This dashboard is protected. Only signed-in users may access it.
    </div>
  </div>

  <script>
    // Auto-redirect countdown
    var seconds = 5;
    var el = document.getElementById('countdownNum');
    var timer = setInterval(function () {
      seconds--;
      if (el) el.textContent = seconds;
      if (seconds <= 0) {
        clearInterval(timer);
        window.location.href = 'index.html';
      }
    }, 1000);

    // Stop countdown if user interacts
    document.addEventListener('click', function () { clearInterval(timer); if (el) el.parentElement.style.display = 'none'; });
    document.addEventListener('keydown', function () { clearInterval(timer); if (el) el.parentElement.style.display = 'none'; });
  </script>

</body>
</html>
