
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #4f46e5, #9333ea);
      position: relative;
    }

    /* ✅ TOP LEFT BACK BUTTON */
    .back-top-btn {
      position: absolute;
      top: 20px;
      left: 20px;
      background: white;
      color: #4f46e5;
      border: none;
      padding: 8px 15px;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      font-weight: bold;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
      transition: 0.3s;
    }

    .back-top-btn:hover {
      background: #e0e7ff;
    }

    .login-container {
      background: white;
      padding: 40px;
      width: 350px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    .login-container h2 {
      text-align: center;
      margin-bottom: 25px;
      color: #333;
    }

    .input-group {
      margin-bottom: 20px;
    }

    .input-group label {
      display: block;
      margin-bottom: 8px;
      color: #555;
      font-size: 14px;
    }

    .input-group input {
      width: 100%;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      outline: none;
      transition: 0.3s;
    }

    .input-group input:focus {
      border-color: #4f46e5;
      box-shadow: 0 0 5px rgba(79, 70, 229, 0.4);
    }

    .login-btn {
      width: 100%;
      padding: 12px;
      background: #4f46e5;
      border: none;
      color: white;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.3s;
    }

    .login-btn:hover {
      background: #4338ca;
    }

    .extra-links {
      margin-top: 15px;
      text-align: center;
      font-size: 14px;
    }

    .extra-links a {
      color: #4f46e5;
      text-decoration: none;
    }

    .extra-links a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>

  <!-- ✅ BACK BUTTON (TOP LEFT) -->
  <button class="back-top-btn" onclick="window.location.href='landingpage.html'">
    ← Back
  </button>

  <div class="login-container">
    <h2>Sign In</h2>

    <form onsubmit="handleLogin(event)">
      <div class="input-group">
        <label>Email</label>
        <input type="text" id="email" placeholder="Enter your email" required />
      </div>

      <div class="input-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Enter your password" required />
      </div>

      <button type="submit" class="login-btn">Login</button>

      <div class="extra-links">
      
        <p>Don't have an account? </p><a href="register.html">Register</a></p>
      </div>
    </form>
  </div>

  <script>
    function handleLogin(event) {
      event.preventDefault();
      
      const username = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();
      
      if (username === "admin" && password === "admin") {
        const adminUser = { id: 4, name: 'admin', email: 'admin', password: 'admin', role: 'Admin' };
        localStorage.setItem('currentUser', JSON.stringify(adminUser));
        alert("Login successful!");
        window.location.href = "dashboard.html";
        return;
      }
      
      const storedUsers = localStorage.getItem('appUsers');
      let users = [];
      
      if (storedUsers) {
        users = JSON.parse(storedUsers);
      }
      
      if (users.length === 0 || !users.some(u => u.password)) {
        users = [
          { id: 1, name: 'John Doe', email: 'john@example.com', password: '1234', role: 'Admin' },
          { id: 2, name: 'Jane Smith', email: 'jane@example.com', password: '1234', role: 'Editor' },
          { id: 3, name: 'Bob Johnson', email: 'bob@example.com', password: '1234', role: 'Viewer' },
          { id: 4, name: 'admin', email: 'admin', password: 'admin', role: 'Admin' }
        ];
        localStorage.setItem('appUsers', JSON.stringify(users));
      }
      
      const user = users.find(u => (u.email === username || u.name === username) && u.password === password);
      
      if (user) {
        localStorage.setItem('currentUser', JSON.stringify(user));
        alert("Login successful!");
        window.location.href = "dashboard.html";
      } else {
        alert("Invalid username or password.");
      }
    }
  </script>

</body>
</html>
